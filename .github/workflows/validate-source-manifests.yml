name: Validate Source Manifests

on:
  push:
    paths:
      - '**/source-manifest.json'
      - 'schemas/source-manifest.schema.json'
      - 'templates/source-manifest.example.json'
      - '.github/workflows/validate-source-manifests.yml'
  pull_request:
    paths:
      - '**/source-manifest.json'
      - 'schemas/source-manifest.schema.json'
      - 'templates/source-manifest.example.json'
      - '.github/workflows/validate-source-manifests.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator
        run: python -m pip install --disable-pip-version-check 'jsonschema[format]>=4.22,<5'

      - name: Validate schema and manifests
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          from jsonschema import Draft202012Validator, FormatChecker
          from jsonschema.exceptions import SchemaError

          root = Path('.')
          schema_path = root / 'schemas' / 'source-manifest.schema.json'

          with schema_path.open(encoding='utf-8') as handle:
              schema = json.load(handle)

          try:
              Draft202012Validator.check_schema(schema)
          except SchemaError as exc:
              print(f'::error file={schema_path}::Invalid JSON Schema: {exc.message}')
              sys.exit(1)

          validator = Draft202012Validator(
              schema,
              format_checker=FormatChecker(),
          )

          manifests = sorted(root.glob('**/source-manifest.json'))
          example_path = root / 'templates' / 'source-manifest.example.json'
          if example_path.exists():
              manifests.append(example_path)

          if not manifests:
              print('::error::No source manifests were found.')
              sys.exit(1)

          failed = False

          for manifest_path in manifests:
              try:
                  with manifest_path.open(encoding='utf-8') as handle:
                      document = json.load(handle)
              except (OSError, json.JSONDecodeError) as exc:
                  print(f'::error file={manifest_path}::Unable to read JSON: {exc}')
                  failed = True
                  continue

              errors = sorted(
                  validator.iter_errors(document),
                  key=lambda error: list(error.absolute_path),
              )

              if not errors:
                  print(f'VALID: {manifest_path}')
                  continue

              failed = True
              for error in errors:
                  location = '.'.join(str(part) for part in error.absolute_path) or '<root>'
                  print(
                      f'::error file={manifest_path}::'
                      f'{location}: {error.message}'
                  )

          if failed:
              sys.exit(1)

          print(f'Validated {len(manifests)} manifest file(s).')
          PY
