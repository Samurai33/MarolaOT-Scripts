name: Validate JSON

on:
  push:
    paths:
      - '**/*.json'
  pull_request:
    paths:
      - '**/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.json' -print0 | while IFS= read -r -d '' file; do
            echo "Validating $file"
            jq empty "$file"
          done
